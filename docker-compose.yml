services:
  # ============================================================
  # 1. POSTGRESQL VERİTABANI
  # ============================================================
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: backend_mastery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ============================================================
  # 2. RABBITMQ MESAJ KUYRUĞU SUNUCUSU
  # ============================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672" # Mesaj göndermek/almak için kullanılan port (AMQP)
      - "15672:15672" # RabbitMQ Web Yönetim Arayüzü portu (Browser'dan girmek için)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # ============================================================
  # 3. MINIO RESİM DEPOLAMA SUNUCUSU
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: minio
    ports:
      - "9000:9000" # Spring Boot'un resim yükleyeceği API portu
      - "9001:9001" # MinIO Web Yönetim Arayüzü portu (Browser'dan girmek için)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    # MinIO'yu başlatan komut: console portunu 9001 olarak set eder
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ============================================================
  # 4. SPRING BOOT UYGULAMAMIZ (APP)
  # ============================================================
  app:
    build: .
    container_name: spring-app
    ports:
      - "8080:8080"
    # Diğer servisler ayağa kalkmadan uygulamanın başlamasını engeller
    depends_on:
      - postgres-db
      - rabbitmq
      - minio
    environment:
      # Hangi Spring profilinin aktif olacağını söylüyoruz
      SPRING_PROFILES_ACTIVE: prod
      # Database bağlantı IP'sini Docker içindeki 'postgres-db' olarak güncelliyoruz
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/backend_mastery
      # RabbitMQ host adını 'rabbitmq' yapıyoruz
      SPRING_RABBITMQ_HOST: rabbitmq
      # MinIO API endpointini 'minio' yapıyoruz (yükleme için)
      MINIO_ENDPOINT: https://s3.eu-north-1.amazonaws.com
      # Resimlerin tarayıcıda düzgün açılabilmesi için public-url'i localhost bırakıyoruz (tarayıcı erişimi için)
      MINIO_PUBLIC_URL: https://s3.eu-north-1.amazonaws.com
      MINIO_ACCESS_KEY: ${AWS_S3_ACCESS_KEY}
      MINIO_SECRET_KEY: ${AWS_S3_SECRET_KEY}
      MINIO_BUCKET_NAME: ${AWS_S3_BUCKET}

volumes:
  postgres_data:
  minio_data:
