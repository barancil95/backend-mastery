<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipariş Detayı - MasteryMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .navbar {
            background: rgba(30, 41, 59, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .brand-logo {
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .btn-purple {
            background: linear-gradient(to right, #6366f1, #a855f7);
            color: white;
            border: none;
            font-weight: 600;
        }
        .btn-purple:hover {
            opacity: 0.9;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Header Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
        <div class="container">
            <a class="navbar-brand brand-logo fs-3" th:href="@{/products}">
                <i class="fa-solid fa-store me-2"></i>MasteryMarket
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/products}"><i class="fa-solid fa-box me-1"></i> Ürünler</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/orders}"><i class="fa-solid fa-receipt me-1"></i> Siparişlerim</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <div sec:authorize="isAuthenticated()" class="dropdown">
                        <button class="btn btn-outline-light dropdown-toggle btn-sm rounded-pill px-3" type="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-user-circle me-1"></i>
                            <span sec:authentication="name">Kullanıcı</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow">
                            <li><span class="dropdown-item-text text-muted" style="font-size: 0.8rem;">Giriş Yapıldı</span></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <button type="submit" class="dropdown-item text-danger">
                                        <i class="fa-solid fa-right-from-bracket me-2"></i> Çıkış Yap
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold m-0" style="color: #cbd5e1;" th:text="'Sipariş #' + ${order.id}">Sipariş #1</h3>
                        <span th:if="${order.status == 'PENDING'}" class="badge bg-warning text-dark px-3 py-2 rounded-pill">Beklemede</span>
                        <span th:if="${order.status == 'CONFIRMED'}" class="badge bg-success px-3 py-2 rounded-pill">Onaylandı</span>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <small class="text-secondary d-block mb-1">Müşteri Adı</small>
                            <h6 class="fw-bold" th:text="${order.customerName}">Baran Çil</h6>
                        </div>
                        <div class="col-md-6">
                            <small class="text-secondary d-block mb-1">E-Posta</small>
                            <h6 class="fw-bold" th:text="${order.customerEmail}">email@example.com</h6>
                        </div>
                    </div>

                    <h5 class="fw-bold mb-3" style="color: #818cf8;">Sipariş Kalemleri</h5>
                    <div class="table-responsive mb-4">
                        <table class="table table-dark table-hover align-middle m-0">
                            <thead>
                                <tr class="text-secondary">
                                    <th>Ürün</th>
                                    <th>Adet</th>
                                    <th>Birim Fiyat</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${order.items}">
                                    <td th:text="${item.productName}">MacBook Pro</td>
                                    <td th:text="${item.quantity}">1</td>
                                    <td class="fw-bold text-success" th:text="'₺' + ${item.unitPrice}">₺0.00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center pt-3 border-top border-slate-700" style="border-color: rgba(255,255,255,0.1) !important;">
                        <span class="fs-5 fw-bold" style="color: #cbd5e1;">Toplam Tutar:</span>
                        <span class="fs-3 fw-bold text-success" th:text="'₺' + ${order.totalAmount}">₺0.00</span>
                    </div>

                    <div class="mt-4">
                        <a th:href="@{/orders}" class="btn btn-outline-light rounded-pill px-4">
                            <i class="fa-solid fa-arrow-left me-1"></i> Siparişlere Dön
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
