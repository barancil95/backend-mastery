<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipariş Detayı — Backend Mastery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .detail-card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-box-seam"></i> Backend Mastery</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/products}"><i class="bi bi-grid"></i> Ürünler</a>
            <a class="nav-link active" th:href="@{/orders}"><i class="bi bi-cart"></i> Siparişler</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card detail-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3><i class="bi bi-receipt"></i> Sipariş #<span th:text="${order.id}"></span></h3>
                    <span class="badge fs-6"
                          th:classappend="${order.status == 'PENDING' ? 'bg-warning text-dark' :
                                           order.status == 'CONFIRMED' ? 'bg-info' :
                                           order.status == 'SHIPPED' ? 'bg-primary' :
                                           order.status == 'DELIVERED' ? 'bg-success' : 'bg-danger'}"
                          th:text="${order.status}">PENDING</span>
                </div>

                <!-- Müşteri Bilgileri -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <p class="text-muted mb-1">Müşteri</p>
                        <p class="fw-bold" th:text="${order.customerName}">İsim</p>
                    </div>
                    <div class="col-md-6">
                        <p class="text-muted mb-1">E-posta</p>
                        <p class="fw-bold" th:text="${order.customerEmail}">email</p>
                    </div>
                </div>

                <!-- Sipariş Kalemleri -->
                <h5 class="mb-3"><i class="bi bi-list-check"></i> Sipariş Kalemleri</h5>
                <div class="table-responsive">
                    <table class="table">
                        <thead class="table-light">
                            <tr>
                                <th>Ürün</th>
                                <th class="text-center">Adet</th>
                                <th class="text-end">Birim Fiyat</th>
                                <th class="text-end">Ara Toplam</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}">
                                <td th:text="${item.productName}">Ürün</td>
                                <td class="text-center" th:text="${item.quantity}">1</td>
                                <td class="text-end">₺<span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}">0.00</span></td>
                                <td class="text-end fw-bold">₺<span th:text="${#numbers.formatDecimal(item.unitPrice * item.quantity, 1, 2)}">0.00</span></td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr class="table-light">
                                <td colspan="3" class="text-end fw-bold">TOPLAM:</td>
                                <td class="text-end fw-bold h5 text-primary">
                                    ₺<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</span>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <a th:href="@{/orders}" class="btn btn-outline-secondary mt-3">
                    <i class="bi bi-arrow-left"></i> Siparişlere Dön
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
