<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Sipariş — Backend Mastery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .form-card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; }
        .item-row { background: #f8f9fa; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-box-seam"></i> Backend Mastery</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/products}"><i class="bi bi-grid"></i> Ürünler</a>
            <a class="nav-link active" th:href="@{/orders}"><i class="bi bi-cart"></i> Siparişler</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card form-card p-4">
                <h3 class="mb-4"><i class="bi bi-cart-plus"></i> Yeni Sipariş</h3>

                <!-- Hata mesajı -->
                <div th:if="${errorMessage}" class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
                </div>

                <form th:action="@{/orders}" th:object="${order}" method="post">

                    <!-- Müşteri Bilgileri -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="customerName" class="form-label">Müşteri Adı *</label>
                            <input type="text" class="form-control" id="customerName" th:field="*{customerName}"
                                   th:classappend="${#fields.hasErrors('customerName') ? 'is-invalid' : ''}"
                                   placeholder="Ad Soyad">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}">Hata</div>
                        </div>
                        <div class="col-md-6">
                            <label for="customerEmail" class="form-label">E-posta *</label>
                            <input type="email" class="form-control" id="customerEmail" th:field="*{customerEmail}"
                                   th:classappend="${#fields.hasErrors('customerEmail') ? 'is-invalid' : ''}"
                                   placeholder="ornek@email.com">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('customerEmail')}" th:errors="*{customerEmail}">Hata</div>
                        </div>
                    </div>

                    <!-- Sipariş Kalemleri -->
                    <h5 class="mt-4 mb-3"><i class="bi bi-list-check"></i> Sipariş Kalemleri</h5>

                    <div id="itemsContainer">
                        <div th:each="item, stat : *{items}" class="item-row">
                            <div class="row align-items-end">
                                <div class="col-md-6">
                                    <label class="form-label">Ürün *</label>
                                    <select class="form-select" th:field="*{items[__${stat.index}__].productId}">
                                        <option value="">-- Ürün Seçin --</option>
                                        <option th:each="product : ${products}"
                                                th:value="${product.id}"
                                                th:text="${product.name + ' — ₺' + #numbers.formatDecimal(product.price, 1, 2) + ' (Stok: ' + product.stockQuantity + ')'}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Adet *</label>
                                    <input type="number" min="1" class="form-control"
                                           th:field="*{items[__${stat.index}__].quantity}" placeholder="1">
                                </div>
                                <div class="col-md-2">
                                    <button type="button" class="btn btn-outline-danger btn-sm w-100"
                                            onclick="this.closest('.item-row').remove()">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="button" class="btn btn-outline-secondary btn-sm mb-4" onclick="addItem()">
                        <i class="bi bi-plus"></i> Kalem Ekle
                    </button>

                    <!-- Butonlar -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Siparişi Oluştur
                        </button>
                        <a th:href="@{/orders}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Geri
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    let itemIndex = [[${order.items.size()}]];

    function addItem() {
        const container = document.getElementById('itemsContainer');
        const productsOptions = document.querySelector('select[name*="productId"]').innerHTML;

        const itemHtml = `
            <div class="item-row">
                <div class="row align-items-end">
                    <div class="col-md-6">
                        <label class="form-label">Ürün *</label>
                        <select class="form-select" name="items[${itemIndex}].productId">
                            ${productsOptions}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Adet *</label>
                        <input type="number" min="1" class="form-control" name="items[${itemIndex}].quantity" placeholder="1">
                    </div>
                    <div class="col-md-2">
                        <button type="button" class="btn btn-outline-danger btn-sm w-100"
                                onclick="this.closest('.item-row').remove()">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', itemHtml);
        itemIndex++;
    }
</script>
</body>
</html>
