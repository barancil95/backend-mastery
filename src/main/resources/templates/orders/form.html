<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipariş Oluştur - MasteryMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .navbar {
            background: rgba(30, 41, 59, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .brand-logo {
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #818cf8;
            color: #fff;
            box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.25);
        }
        .btn-purple {
            background: linear-gradient(to right, #6366f1, #a855f7);
            color: white;
            border: none;
            font-weight: 600;
        }
        .btn-purple:hover {
            opacity: 0.9;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Header Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
        <div class="container">
            <a class="navbar-brand brand-logo fs-3" th:href="@{/products}">
                <i class="fa-solid fa-store me-2"></i>MasteryMarket
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/products}"><i class="fa-solid fa-box me-1"></i> Ürünler</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link active" th:href="@{/orders}"><i class="fa-solid fa-receipt me-1"></i> Siparişlerim</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <div sec:authorize="isAuthenticated()" class="dropdown">
                        <button class="btn btn-outline-light dropdown-toggle btn-sm rounded-pill px-3" type="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-user-circle me-1"></i>
                            <span sec:authentication="name">Kullanıcı</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow">
                            <li><span class="dropdown-item-text text-muted" style="font-size: 0.8rem;">Giriş Yapıldı</span></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <button type="submit" class="dropdown-item text-danger">
                                        <i class="fa-solid fa-right-from-bracket me-2"></i> Çıkış Yap
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h3 class="fw-bold mb-4" style="color: #cbd5e1;">
                        <i class="fa-solid fa-cart-plus me-2 text-indigo" style="color: #818cf8;"></i>Yeni Sipariş Ver
                    </h3>

                    <form th:action="@{/orders}" th:object="${order}" method="post">
                        <!-- Müşteri Bilgileri -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label" style="color: #cbd5e1;">Ad Soyad *</label>
                                <input type="text" class="form-control" th:field="*{customerName}" placeholder="Müşteri Adı" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" style="color: #cbd5e1;">E-Posta *</label>
                                <input type="email" class="form-control" th:field="*{customerEmail}" placeholder="E-Posta" required readonly>
                            </div>
                        </div>

                        <!-- Ürün Seçimi -->
                        <h5 class="fw-bold mt-4 mb-3" style="color: #818cf8;">Sipariş Edilecek Ürün</h5>
                        <div th:each="item, stat : *{items}" class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label" style="color: #cbd5e1;">Ürün Seçin *</label>
                                <select class="form-select" th:field="*{items[__${stat.index}__].productId}" required>
                                    <option value="">-- Ürün Seçiniz --</option>
                                    <option th:each="p : ${products}" 
                                            th:value="${p.id}" 
                                            th:text="${p.name} + ' (₺' + ${p.price} + ' - Stok: ' + ${p.stockQuantity} + ')'"
                                            th:selected="${p.id == param.productId}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" style="color: #cbd5e1;">Adet *</label>
                                <input type="number" min="1" class="form-control" th:field="*{items[__${stat.index}__].quantity}" value="1" required>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-purple rounded-pill px-4">
                                <i class="fa-solid fa-paper-plane me-1"></i> Siparişi Tamamla
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-light rounded-pill px-4">İptal</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
