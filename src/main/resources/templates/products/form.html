<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürün Ekle/Düzenle — Backend Mastery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .form-card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-box-seam"></i> Backend Mastery</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" th:href="@{/products}"><i class="bi bi-grid"></i> Ürünler</a>
            <a class="nav-link" th:href="@{/orders}"><i class="bi bi-cart"></i> Siparişler</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card form-card p-4">
                <h3 class="mb-4">
                    <i class="bi" th:classappend="${product.id != null ? 'bi-pencil' : 'bi-plus-circle'}"></i>
                    <span th:text="${product.id != null ? 'Ürün Düzenle' : 'Yeni Ürün Ekle'}"></span>
                </h3>

                <!-- Form: id varsa güncelleme URL'i, yoksa oluşturma URL'i -->
                <form th:action="${product.id != null ? '/products/edit/' + product.id : '/products'}"
                      th:object="${product}" method="post" enctype="multipart/form-data">

                    <!-- Ürün Adı -->
                    <div class="mb-3">
                        <label for="name" class="form-label">Ürün Adı *</label>
                        <input type="text" class="form-control" id="name" th:field="*{name}"
                               th:classappend="${#fields.hasErrors('name') ? 'is-invalid' : ''}"
                               placeholder="Örn: MacBook Pro">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Hata</div>
                    </div>

                    <!-- Açıklama -->
                    <div class="mb-3">
                        <label for="description" class="form-label">Açıklama</label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="3"
                                  placeholder="Ürün açıklaması..."></textarea>
                    </div>

                    <!-- Fiyat + Stok (yan yana) -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="price" class="form-label">Fiyat (₺) *</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="price" th:field="*{price}"
                                   th:classappend="${#fields.hasErrors('price') ? 'is-invalid' : ''}"
                                   placeholder="0.00">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Hata</div>
                        </div>
                        <div class="col-md-6">
                            <label for="stockQuantity" class="form-label">Stok Miktarı *</label>
                            <input type="number" min="0" class="form-control" id="stockQuantity" th:field="*{stockQuantity}"
                                   placeholder="0">
                        </div>
                    </div>

                    <!-- Görsel Yükleme -->
                    <div class="mb-4">
                        <label for="imageFile" class="form-label">Ürün Görseli</label>
                        <input class="form-control" type="file" id="imageFile" name="imageFile" accept="image/*">
                        <div class="form-text">Görsel seçilirse MinIO/S3 depolama alanına yüklenecektir.</div>
                        <div th:if="${product.imageUrl != null}" class="mt-2">
                            <small class="text-muted">Mevcut Görsel:</small><br>
                            <img th:src="${product.imageUrl}" class="mt-1 border rounded" style="max-height: 100px;">
                        </div>
                    </div>

                    <!-- Butonlar -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i>
                            <span th:text="${product.id != null ? 'Güncelle' : 'Kaydet'}"></span>
                        </button>
                        <a th:href="@{/products}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Geri
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
