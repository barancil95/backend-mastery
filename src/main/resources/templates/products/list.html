<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürünler - MasteryMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .navbar {
            background: rgba(30, 41, 59, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .brand-logo {
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .product-img {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
        .btn-purple {
            background: linear-gradient(to right, #6366f1, #a855f7);
            color: white;
            border: none;
            font-weight: 600;
        }
        .btn-purple:hover {
            opacity: 0.9;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Navbar Header -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
        <div class="container">
            <a class="navbar-brand brand-logo fs-3" th:href="@{/products}">
                <i class="fa-solid fa-store me-2"></i>MasteryMarket
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/products}"><i class="fa-solid fa-box me-1"></i> Ürünler</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/orders}"><i class="fa-solid fa-receipt me-1"></i> Siparişlerim</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <!-- SADECE ADMIN GÖREBİLİR: Yeni Ürün Ekle Butonu -->
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/new}" class="btn btn-purple btn-sm px-3 rounded-pill">
                        <i class="fa-solid fa-plus me-1"></i> Yeni Ürün Ekle
                    </a>

                    <!-- GİRİŞ YAPILMIŞSA KULLANICI BİLGİSİ VE LOGOUT -->
                    <div sec:authorize="isAuthenticated()" class="dropdown">
                        <button class="btn btn-outline-light dropdown-toggle btn-sm rounded-pill px-3" type="button" data-bs-toggle="dropdown">
                            <i class="fa-solid fa-user-circle me-1"></i>
                            <span sec:authentication="name">Kullanıcı</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end shadow">
                            <li><span class="dropdown-item-text text-muted" style="font-size: 0.8rem;">Giriş Yapıldı</span></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post" class="m-0">
                                    <button type="submit" class="dropdown-item text-danger">
                                        <i class="fa-solid fa-right-from-bracket me-2"></i> Çıkış Yap
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>

                    <!-- GİRİŞ YAPILMAMIŞSA GİRİŞ / KAYIT BUTONLARI -->
                    <div sec:authorize="!isAuthenticated()" class="d-flex gap-2">
                        <a th:href="@{/login}" class="btn btn-outline-light btn-sm rounded-pill px-3">Giriş Yap</a>
                        <a th:href="@{/register}" class="btn btn-purple btn-sm rounded-pill px-3">Kayıt Ol</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold m-0">Tüm Ürünler</h2>
                <p class="text-secondary m-0">En son eklenen teknolojik ürünleri keşfedin</p>
            </div>
        </div>

        <!-- Ürün Kartları -->
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="product : ${products}">
                <div class="card h-100">
                    <img th:if="${product.imageUrl}" th:src="${product.imageUrl}" class="product-img" alt="Ürün Görseli">
                    <img th:unless="${product.imageUrl}" src="https://via.placeholder.com/300x200?text=Gorsel+Yok" class="product-img" alt="Varsayılan Görsel">
                    
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold" th:text="${product.name}">Ürün Adı</h5>
                        <p class="card-text text-secondary small flex-grow-1" th:text="${product.description}">Açıklama</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="fs-4 fw-bold text-indigo" style="color: #818cf8;" th:text="'₺' + ${product.price}">₺0</span>
                            <span class="badge bg-secondary" th:text="'Stok: ' + ${product.stockQuantity}">Stok: 0</span>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent border-top-0 pb-3 d-flex gap-2">
                        <a th:href="@{/orders/new(productId=${product.id})}" class="btn btn-purple btn-sm flex-grow-1 rounded-pill">
                            <i class="fa-solid fa-cart-shopping me-1"></i> Sipariş Ver
                        </a>

                        <!-- SADECE ADMIN: Silme Butonu -->
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/delete/{id}(id=${product.id})}" 
                           class="btn btn-outline-danger btn-sm rounded-pill"
                           onclick="return confirm('Bu ürünü silmek istediğinize emin misiniz?');">
                            <i class="fa-solid fa-trash"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
