<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ürünler — MasteryMarket</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --bg-color: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
            --hover-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.08), 0 10px 10px -6px rgba(79, 70, 229, 0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #334155;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            position: sticky; top: 0; z-index: 1000;
        }
        .navbar-brand {
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-link { font-weight: 500; color: #64748b !important; }
        .nav-link:hover, .nav-link.active { color: #4f46e5 !important; }

        /* Premium Product Cards */
        .product-card {
            border: 1px solid #f1f5f9;
            background: white;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--hover-shadow);
            border-color: rgba(79, 70, 229, 0.2);
        }

        .product-img-wrapper {
            position: relative;
            width: 100%;
            height: 220px;
            background-color: #f8fafc;
            overflow: hidden;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.05);
        }

        .product-img-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 3rem;
        }

        .price-badge {
            font-weight: 800;
            font-size: 1.25rem;
            color: #4f46e5;
        }

        .btn-add-product {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
            transition: all 0.2s;
        }
        .btn-add-product:hover {
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.3);
            color: white;
            transform: translateY(-1px);
        }
        
        .badge-stock {
            border-radius: 6px;
            padding: 6px 12px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        /* Action Buttons Inside Card */
        .card-actions {
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
            margin-top: auto;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-lightning-charge-fill text-primary"></i> MasteryMarket</a>
        <div class="navbar-nav ms-auto gap-2">
            <a class="nav-link active" th:href="@{/products}"><i class="bi bi-grid-fill"></i> Ürün Vitrini</a>
            <a class="nav-link" th:href="@{/orders}"><i class="bi bi-receipt-cutoff"></i> Siparişler</a>
        </div>
    </div>
</nav>

<div class="container py-5">

    <!-- Başarı bildirimi -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4" role="alert" style="border-radius: 12px; background: #ecfdf5; color: #065f46;">
        <div class="d-flex align-items-center">
            <i class="bi bi-check-circle-fill me-2 fs-5 text-success"></i>
            <span th:text="${successMessage}" class="fw-semibold"></span>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Başlık ve Ürün Ekle -->
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-extrabold text-dark mb-1" style="letter-spacing: -1px; font-weight: 800;">Ürün Vitrini</h2>
            <p class="text-muted small mb-0">Marketplace kataloğundaki tüm aktif ürünler</p>
        </div>
        <a th:href="@{/products/new}" class="btn btn-add-product">
            <i class="bi bi-plus-lg me-1"></i> Yeni Ürün Ekle
        </a>
    </div>

    <!-- Boş Liste Senaryosu -->
    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 bg-white rounded-4 shadow-sm border border-dashed border-2">
        <i class="bi bi-grid-3x3-gap text-muted" style="font-size: 4rem; opacity: 0.3;"></i>
        <h5 class="fw-bold mt-3 text-dark">Henüz ürün eklenmemiş</h5>
        <p class="text-muted small mx-auto" style="max-width: 400px;">Marketplace'te sergilenecek ürün bulunamadı. Hemen ilk ürünü ekleyerek başlayabilirsiniz.</p>
        <a th:href="@{/products/new}" class="btn btn-outline-primary mt-2" style="border-radius: 8px;">İlk Ürünü Ekle</a>
    </div>

    <!-- Ürün Grid -->
    <div class="row g-4" th:unless="${#lists.isEmpty(products)}">
        <div class="col-md-6 col-lg-4" th:each="product : ${products}">
            <div class="card product-card">
                <!-- Ürün Resmi -->
                <div class="product-img-wrapper">
                    <img th:if="${product.imageUrl != null}" th:src="${product.imageUrl}" class="product-img" th:alt="${product.name}">
                    <div th:unless="${product.imageUrl != null}" class="product-img-placeholder">
                        <i class="bi bi-image"></i>
                    </div>
                </div>

                <!-- Kart İçeriği -->
                <div class="card-body d-flex flex-column p-4">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="fw-bold text-dark mb-0" th:text="${product.name}">Ürün Adı</h5>
                        <span class="badge badge-stock" 
                              th:classappend="${product.stockQuantity > 0 ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'}"
                              th:text="${product.stockQuantity > 0 ? 'Stokta Var' : 'Tükendi'}"
                              style="font-size: 0.7rem; border: 1px solid currentColor;">Stok</span>
                    </div>
                    
                    <p class="text-muted small mb-4" style="height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;" th:text="${product.description}">Açıklama</p>
                    
                    <div class="card-actions">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="price-badge">
                                ₺<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span>
                            </span>
                            <small class="text-muted">
                                Stok: <span class="fw-semibold text-dark" th:text="${product.stockQuantity}">0</span> adet
                            </small>
                        </div>
                        <div class="btn-group w-100 gap-2">
                            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-outline-primary btn-sm rounded-2 flex-grow-1 py-2">
                                <i class="bi bi-pencil-square me-1"></i> Düzenle
                            </a>
                            <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post" class="d-inline flex-grow-1">
                                <button type="submit" class="btn btn-outline-danger btn-sm w-100 rounded-2 py-2"
                                        onclick="return confirm('Bu ürünü silmek istediğinize emin misiniz?')">
                                    <i class="bi bi-trash3 me-1"></i> Sil
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
